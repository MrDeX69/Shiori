name: Shiori
description: "Premium manga reader app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  dio: ^5.4.0
  go_router: ^14.0.0
  extended_image: ^9.0.0
  flutter_cache_manager: ^3.3.1
  dynamic_color: ^1.7.0
  palette_generator: ^0.3.3
  flutter_animate: ^4.5.0
  local_auth: ^2.3.0
  shimmer: ^3.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  get_it: ^8.0.0
  injectable: ^2.4.0
  flutter_downloader: ^1.11.7
  path_provider: ^2.1.3
  path: ^1.9.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.0
  flutter_native_splash: ^2.4.0
  url_launcher: ^6.3.0
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.2
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E85D75"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#0A0A0F"
  color_dark: "#0A0A0F"
  android_12:
    color: "#0A0A0F"
    icon_background_color: "#0A0A0F"
    color_dark: "#0A0A0F"
    icon_background_color_dark: "#0A0A0F"
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/